<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등학교 교사 실근무경력 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; }
        .timeline-line { position: absolute; left: 15px; top: 24px; bottom: -24px; width: 2px; background-color: #e2e8f0; z-index: 0; }
        .timeline-dot { position: absolute; left: 11px; top: 24px; width: 10px; height: 10px; border-radius: 50%; background-color: white; border: 2px solid #8b5cf6; z-index: 1; box-shadow: 0 0 0 4px #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-4xl mx-auto p-4 sm:p-8">
        <!-- Header -->
        <header class="mb-8 text-center cursor-pointer" onclick="location.reload()">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2 flex items-center justify-center">
                <span class="inline-flex items-center justify-center p-2.5 bg-indigo-100 rounded-2xl mr-3 text-indigo-600 shadow-sm">
                    <i class="fa-solid fa-calculator text-2xl"></i>
                </span>
                교원 실근무연수 분석기
            </h1>
            <p class="text-slate-500 font-medium">나이스 인사기록 엑셀 파일을 분석하여 실제 근무 기간을 역산법으로 도출합니다.</p>
        </header>

        <!-- Main Controls -->
        <div class="glass-panel rounded-3xl p-6 sm:p-8 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- File Upload -->
                <div class="flex flex-col h-full">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-slate-700">인사기록(임용발령(전체)) 파일 업로드</label>
                        <button onclick="document.getElementById('guideModal').classList.remove('hidden')" class="text-xs text-indigo-500 hover:text-indigo-700 font-bold bg-indigo-50 px-2 py-1 rounded">
                            <i class="fa-solid fa-circle-question mr-1"></i>다운로드 방법
                        </button>
                    </div>
                    <!-- 높이를 우측 폼과 맞추기 위해 flex-1 및 min-h 추가 -->
                    <div id="dropzone" class="flex-1 relative border-2 border-dashed border-slate-300 rounded-2xl p-6 flex flex-col justify-center items-center text-center hover:border-indigo-400 hover:bg-indigo-50/50 transition-all cursor-pointer group min-h-[120px]">
                        <input type="file" id="fileInput" accept=".xls,.xlsx" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="space-y-2 pointer-events-none">
                            <i class="fa-solid fa-file-excel text-3xl text-slate-400 group-hover:text-indigo-400 transition-colors"></i>
                            <p class="text-sm font-medium text-slate-600"><span class="text-indigo-500 font-bold">클릭</span> 또는 파일을 끌어다 놓으세요</p>
                            <p id="fileName" class="text-xs text-slate-400 font-mono"></p>
                        </div>
                    </div>
                </div>

                <!-- Settings -->
                <div class="flex flex-col justify-between h-full gap-3">
                    <!-- 기준일 설정 (오늘, 학년도 마지막 버튼 포함) -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-bold text-slate-700">기준일 설정</label>
                            <div class="flex gap-2">
                                <button type="button" onclick="setToday()" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 hover:text-indigo-800 font-bold px-2.5 py-1 rounded-lg border border-indigo-200 transition-colors shadow-sm flex items-center">
                                    <i class="fa-solid fa-calendar-day mr-1.5"></i>오늘
                                </button>
                                <button type="button" onclick="setEndOfAcademicYear()" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 hover:text-indigo-800 font-bold px-2.5 py-1 rounded-lg border border-indigo-200 transition-colors shadow-sm flex items-center">
                                    <i class="fa-regular fa-calendar-check mr-1.5"></i>학년도 마지막
                                </button>
                            </div>
                        </div>
                        <input type="date" id="refDate" class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 shadow-sm transition-shadow">
                    </div>
                    
                    <!-- 정렬 순서 -->
                    <div>
                        <label for="sortOrder" class="block text-sm font-bold text-slate-700 mb-2">정렬 순서</label>
                        <select id="sortOrder" onchange="if(currentJsonData) document.getElementById('calcBtn').click()" class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 shadow-sm font-bold cursor-pointer hover:bg-slate-100 transition-colors outline-none">
                            <option value="desc">최신순</option>
                            <option value="asc">과거순</option>
                        </select>
                    </div>

                    <button id="calcBtn" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm px-5 py-3.5 transition-all shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>실근무경력 분석하기
                    </button>
                </div>
            </div>
            
            <div id="userInfo" class="hidden mt-6 pt-6 border-t border-slate-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 border border-slate-200">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-0.5">대상자</p>
                        <p id="userName" class="text-sm font-bold text-slate-800"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Loading -->
        <div id="loading" class="hidden text-center py-12">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-4"></i>
            <p class="text-slate-500 font-medium animate-pulse">데이터를 정밀 분석 중입니다...</p>
        </div>

        <div id="resultContainer" class="hidden space-y-8"></div>
    </div>

    <!-- Modals -->
    <div id="errorModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-sm w-full shadow-2xl">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="text-lg font-bold text-center text-slate-900 mb-2">안내사항</h3>
            <p id="errorMessage" class="text-sm text-slate-600 text-center mb-6 whitespace-pre-line leading-relaxed"></p>
            <button onclick="document.getElementById('errorModal').classList.add('hidden')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold rounded-xl py-3 transition-colors">확인</button>
        </div>
    </div>

    <div id="guideModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-2xl w-full shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-900"><i class="fa-solid fa-download mr-2 text-indigo-500"></i>인사기록 다운로드 방법</h3>
                <button onclick="document.getElementById('guideModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="overflow-y-auto hide-scroll flex-1 p-2 space-y-6">
                <div class="bg-indigo-50 rounded-xl p-4">
                    <p class="text-sm text-indigo-800 font-medium">1. 나이스(NEIS) 인사기록카드 출력 메뉴에서 <strong class="font-bold">임용발령(전체)</strong>를 체크하고 [출력]을 누릅니다.</p>
                </div>
                <div class="bg-indigo-50 rounded-xl p-4">
                    <p class="text-sm text-indigo-800 font-medium">2. 출력 미리보기 창 상단의 저장 버튼을 눌러 <strong class="font-bold">XLS</strong> 형식으로 저장합니다.</p>
                </div>
            </div>
        </div>
    </div>

<script>
    document.getElementById('refDate').value = new Date().toISOString().split('T')[0];
    let currentJsonData = null;
    let globalSchoolRegionCache = {}; // 정렬 변경 시 즉시 로딩을 위한 글로벌 캐시
    let globalSchoolSubRegionMap = {}; 

    // [업데이트] 오늘 날짜 자동 설정 로직
    function setToday() {
        document.getElementById('refDate').value = new Date().toISOString().split('T')[0];
        
        // 엑셀이 로드된 상태에서 버튼을 누르면 즉시 재계산까지 실행
        if(currentJsonData) {
            document.getElementById('calcBtn').click();
        }
    }

    // [업데이트] 당해 학년도 말일(2월 28일 또는 29일) 자동 계산 로직
    function setEndOfAcademicYear() {
        const today = new Date();
        let year = today.getFullYear();
        let month = today.getMonth() + 1;
        
        // 1, 2월인 경우 이전 해에 시작한 학년도의 연장선이므로 올해 2월이 학년도말. 3~12월은 내년 2월이 학년도말.
        let targetYear = (month <= 2) ? year : year + 1;
        
        // targetYear의 3월 1일에서 하루를 빼면 완벽한 2월의 마지막 날(윤년 포함)이 나옵니다.
        let lastDayOfFeb = new Date(targetYear, 2, 0); 
        
        let yyyy = lastDayOfFeb.getFullYear();
        let mm = String(lastDayOfFeb.getMonth() + 1).padStart(2, '0');
        let dd = String(lastDayOfFeb.getDate()).padStart(2, '0');
        
        document.getElementById('refDate').value = `${yyyy}-${mm}-${dd}`;
        
        // 엑셀이 로드된 상태에서 버튼을 누르면 즉시 재계산까지 실행
        if(currentJsonData) {
            document.getElementById('calcBtn').click();
        }
    }

    // [핵심 1] 완벽한 관공서 역산법 (DATEDIF 100% 동기화)
    function calcPeriodYMD(startStr, endStr) {
        if(!startStr || startStr.length < 8) return {y:0, m:0, d:0};
        if(!endStr || endStr === "9999-99-99") endStr = startStr;
        
        let startDate = new Date(startStr);
        let endDate = new Date(endStr);
        endDate.setDate(endDate.getDate() + 1); 
        
        let y = endDate.getFullYear() - startDate.getFullYear();
        let m = endDate.getMonth() - startDate.getMonth();
        let d = endDate.getDate() - startDate.getDate();

        if (d < 0) {
            m -= 1;
            let prevMonth = endDate.getMonth() === 0 ? 11 : endDate.getMonth() - 1;
            let prevYear = endDate.getMonth() === 0 ? endDate.getFullYear() - 1 : endDate.getFullYear();
            let daysInPrevMonth = new Date(prevYear, prevMonth + 1, 0).getDate();
            d += daysInPrevMonth;
            if (d < 0) d = 0; // 나비효과 방어막
        }
        if (m < 0) { y -= 1; m += 12; }
        return { y: y, m: m, d: d };
    }

    function addYMD(p1, p2) {
        let d = p1.d + p2.d;
        let m = p1.m + p2.m + Math.floor(d / 30);
        d = d % 30;
        let y = p1.y + p2.y + Math.floor(m / 12);
        m = m % 12;
        return {y, m, d};
    }

    function subYMD(p1, p2) {
        let d = p1.d - p2.d;
        let m = p1.m - p2.m;
        let y = p1.y - p2.y;
        if (d < 0) { m -= 1; d += 30; }
        if (m < 0) { y -= 1; m += 12; }
        if (y < 0) return {y:0, m:0, d:0}; 
        return {y, m, d};
    }

    function formatYMDObj(period) {
        if (period.y === 0 && period.m === 0 && period.d === 0) return "0일";
        let res = [];
        if (period.y > 0) res.push(`${period.y}년`);
        if (period.m > 0) res.push(`${period.m}개월`);
        if (period.d > 0) res.push(`${period.d}일`);
        return res.join(' ');
    }

    function periodToDays(p) { return p.y * 365 + p.m * 30 + p.d; }

    function mergePeriods(records) {
        if(records.length === 0) return [];
        let periods = records.map(r => ({start: new Date(r.startDate), end: new Date(r.endDate)}));
        periods.sort((a,b) => a.start - b.start);
        let merged = [periods[0]];
        for(let i=1; i<periods.length; i++) {
            let last = merged[merged.length-1];
            let curr = periods[i];
            let lastEndNextDay = new Date(last.end);
            lastEndNextDay.setDate(lastEndNextDay.getDate() + 1);
            if (curr.start <= lastEndNextDay) {
                if (curr.end > last.end) last.end = curr.end;
            } else {
                merged.push(curr);
            }
        }
        return merged.map(p => ({
            startStr: p.start.toISOString().split('T')[0],
            endStr: p.end.toISOString().split('T')[0]
        }));
    }

    function getPeriodFromMerged(mergedPeriods) {
        let total = {y:0, m:0, d:0};
        mergedPeriods.forEach(p => {
            total = addYMD(total, calcPeriodYMD(p.startStr, p.endStr));
        });
        return total;
    }

    function determineCategory(typeStr) {
        if (!typeStr) return 'WORK';
        const t = typeStr.replace(/\s+/g, '');
        if (t.includes('휴직') && t.includes('10호')) return 'WORK';
        if (t.includes('복직') || t.includes('파견복귀')) return 'HIDDEN_WORK';
        if (t.includes('휴직') || t.includes('정직') || t.includes('직위해제') || t.includes('파견')) return 'EXCLUSION';
        if (t.match(/전보|명칭변경|신규채용|채용|전입|전출/)) return 'MARKER';
        return 'WORK';
    }

    // [정선됨] 지역 및 방위 명칭 추출 로직
    function extractRegionAndSchool(deptStr, authStr) {
        let str = (deptStr || '') + ' ' + (authStr || '');
        str = str.replace(/\s+/g, ' ');
        let region = "", school = "";
        let dept = (deptStr || '').replace(/\s+/g, '');
        let auth = (authStr || '').replace(/\s+/g, '');
        
        let regionMatch = dept.match(/([가-힣]+교육지원청|[가-힣]+교육청)/);
        if (regionMatch) region = regionMatch[1];
        else {
            regionMatch = auth.match(/([가-힣]+교육지원청|[가-힣]+교육청)/);
            if (regionMatch) region = regionMatch[1];
        }

        let isProvincial = false;
        if (region && region.match(/경상남도교육청|경상북도교육청|경기도교육청|전라남도교육청|전라북도교육청|충청남도교육청|충청북도교육청|강원도교육청|제주특별자치도교육청|서울특별시교육청|부산광역시교육청|대구광역시교육청|인천광역시교육청|광주광역시교육청|대전광역시교육청|울산광역시교육청|세종특별자치시교육청/)) {
            if (!dept.includes('지원청') && !dept.match(/창원|마산|진해|밀양|사천|거제|통영|김해|양산|의령|함안|창녕|고성|남해|하동|산청|함양|거창|합천/)) {
                isProvincial = true;
            }
        }

        if (region && !isProvincial) {
            const provRegex = /(경상남도|경상북도|경기도|전라남도|전라북도|전북특별자치도|충청남도|충청북도|강원도|강원특별자치도|제주특별자치도|서울특별시|부산광역시|대구광역시|인천광역시|광주광역시|대전광역시|울산광역시|세종특별자치시)/g;
            let strippedRegion = region.replace(provRegex, '').replace(/^교육청/, '');
            
            // 시/도 방위 명칭 스마트 복원
            if (strippedRegion.match(/^(강남|강북|동부|서부|남부|북부|중부|성북|성동|동래|해운대|강서|강동)/)) {
                let provMatch = region.match(provRegex);
                if (provMatch) region = provMatch[0] + strippedRegion; 
                else region = strippedRegion;
            } else {
                region = strippedRegion;
            }
        }

        let match = str.match(/([가-힣]+(초등학교|유치원|분교장|학교|학무과|교육과|지원국|연수원|연구원|수련원|기획부))/);
        if (match) school = match[1];

        if (isProvincial && school && school.match(/초등학교|유치원|분교|학교/)) region = ""; 
        return { region, school };
    }

    function showError(msg) {
        document.getElementById('errorMessage').innerText = msg;
        document.getElementById('errorModal').classList.remove('hidden');
    }

    // 파일 업로드 처리
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-indigo-500', 'bg-indigo-50/50'); });
    dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('border-indigo-500', 'bg-indigo-50/50'); });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('border-indigo-500', 'bg-indigo-50/50');
        if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFile(fileInput.files[0]); }
    });
    fileInput.addEventListener('change', (e) => { if(e.target.files.length) handleFile(e.target.files[0]); });

    function handleFile(file) {
        document.getElementById('fileName').innerText = file.name;
        document.getElementById('userInfo').classList.add('hidden');
        document.getElementById('resultContainer').classList.add('hidden');
        document.getElementById('resultContainer').innerHTML = '';
        currentJsonData = null;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawDataArray = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

                let headerRowIndex = -1;
                for (let i = 0; i < Math.min(rawDataArray.length, 30); i++) {
                    if (rawDataArray[i].some(cell => typeof cell === 'string' && (cell.replace(/\s+/g, '').includes('임용구분') || cell.replace(/\s+/g, '').includes('발령구분')))) {
                        headerRowIndex = i; break;
                    }
                }

                if (headerRowIndex === -1) throw new Error("파일 형식 오류: '임용구분'을 찾을 수 없습니다.");

                const headers = rawDataArray[headerRowIndex].map(h => String(h || '').trim());
                const jsonRows = [];
                for (let i = headerRowIndex + 1; i < rawDataArray.length; i++) {
                    let rowObj = {};
                    let hasData = false;
                    headers.forEach((h, colIndex) => {
                        if (h) {
                            rowObj[h] = rawDataArray[i][colIndex];
                            if (rawDataArray[i][colIndex] !== "") hasData = true;
                        }
                    });
                    if (hasData) jsonRows.push(rowObj);
                }

                if (jsonRows.length === 0) throw new Error("엑셀 파일에 분석할 발령 데이터가 없습니다.");

                const keys = Object.keys(jsonRows[0] || {});
                const findKey = (keywords) => keys.find(k => keywords.some(keyword => typeof k === 'string' && k.replace(/\s+/g, '').includes(keyword)));
                
                const keyType = findKey(['임용구분', '발령구분']);
                const keyPosition = findKey(['직위', '직급', '직위(급)', '직급(직위)']);
                const keyDept = findKey(['부서', '소속']);

                const isPrincipal = (str) => {
                    if (!str) return false;
                    if (str.includes('교장') && !str.includes('분교장') && !str.includes('학교장')) return true;
                    if (str.includes('교감')) return true;
                    return false;
                };

                for (let i = 0; i < jsonRows.length; i++) {
                    if (isPrincipal(String(jsonRows[i][keyType] || '')) || isPrincipal(String(keyPosition ? jsonRows[i][keyPosition] || '' : '')) || isPrincipal(String(jsonRows[i][keyDept] || ''))) {
                        throw new Error("본 프로그램은 초등교사용 입니다. (교장/교감 분석 불가)");
                    }
                }

                // 성명, 출생, 호봉 추출
                let name = "성명 미상", nameFound = false, birthDate = "", payGrade = "";
                let flatTexts = [];
                for (let i = 0; i < Math.min(rawDataArray.length, 15); i++) {
                    for (let j = 0; j < rawDataArray[i].length; j++) {
                        let val = String(rawDataArray[i][j] || '').trim();
                        if (val) flatTexts.push(val);
                    }
                }

                for (let idx = 0; idx < flatTexts.length; idx++) {
                    let cellNoSpace = flatTexts[idx].replace(/\s+/g, '');
                    if (!nameFound && cellNoSpace.includes('성명')) {
                        let inline = cellNoSpace.replace(/성명(?:한글|한자|영문)?[:：\|]?/g, '').replace(/\([^)]*\)/g, '').replace(/[^\uAC00-\uD7A3]/g, '');
                        if (inline.length >= 2 && inline.length <= 5 && !/주민|번호|생년|기록/.test(inline)) { name = inline; nameFound = true; }
                        else {
                            for (let next = 1; next <= 3 && (idx + next) < flatTexts.length; next++) {
                                let nextCellClean = flatTexts[idx + next].replace(/성명|한글|한자|영문/g, '').replace(/\([^)]*\)/g, '').replace(/[^\uAC00-\uD7A3]/g, '');
                                if (nextCellClean.length >= 2 && nextCellClean.length <= 5 && !/주민|번호|생년|사진|성별|기록|인사/.test(nextCellClean)) { name = nextCellClean; nameFound = true; break; }
                            }
                        }
                    }
                    if (!birthDate && (cellNoSpace.includes('생년월일') || cellNoSpace.includes('주민번호'))) {
                        let inlineMatch = cellNoSpace.match(/(\d{2,4})[./-]?(\d{2})[./-]?(\d{2})/);
                        if (inlineMatch && inlineMatch[0].length >= 6) birthDate = inlineMatch[1].slice(-2) + "." + inlineMatch[2] + "." + inlineMatch[3];
                        else {
                            for (let next = 1; next <= 3 && (idx + next) < flatTexts.length; next++) {
                                let nextMatch = flatTexts[idx + next].replace(/\s+/g, '').match(/(\d{2,4})[./-]?(\d{2})[./-]?(\d{2})/);
                                if (nextMatch && nextMatch[0].length >= 6) { birthDate = nextMatch[1].slice(-2) + "." + nextMatch[2] + "." + nextMatch[3]; break; }
                            }
                        }
                    }
                    if (!payGrade && cellNoSpace.includes('호봉')) {
                        let inlineMatch = cellNoSpace.match(/(\d+)호봉/);
                        if (inlineMatch) payGrade = inlineMatch[1] + "호봉";
                        else {
                            for (let next = 1; next <= 3 && (idx + next) < flatTexts.length; next++) {
                                let nextMatch = flatTexts[idx + next].replace(/\s+/g, '').match(/(\d+)(?:호봉)?/);
                                if (nextMatch && parseInt(nextMatch[1]) > 0 && parseInt(nextMatch[1]) <= 50) { payGrade = nextMatch[1] + "호봉"; break; }
                            }
                        }
                    }
                }

                if (!nameFound || name === "성명 미상") {
                    let match = file.name.replace(/\.[^/.]+$/, "").replace(/인사기록|임용발령|전체|카드|다운로드|복사본|[\d\s_\-\(\)\[\]]/g, '').match(/^[가-힣]{2,5}$/);
                    if (match && !/주민|번호|성명/.test(match[0])) { name = match[0]; nameFound = true; }
                }

                let extraStr = [birthDate, payGrade].filter(Boolean).join(' / ');
                if (extraStr) extraStr = ` <span class="text-xs font-normal text-slate-500 ml-2 bg-slate-100 px-2.5 py-0.5 rounded-full border border-slate-200 shadow-sm">${extraStr}</span>`;

                currentJsonData = jsonRows;
                document.getElementById('userName').innerHTML = name + extraStr;
                document.getElementById('userInfo').classList.remove('hidden');

            } catch(err) {
                showError(err.message);
                fileInput.value = '';
                document.getElementById('fileName').innerText = '';
            }
        };
        reader.readAsArrayBuffer(file);
    }

    document.getElementById('calcBtn').addEventListener('click', () => {
        if (!currentJsonData) { showError("먼저 엑셀 파일을 업로드해주세요."); return; }
        const refDateStr = document.getElementById('refDate').value;
        if (!refDateStr) { showError("기준일을 설정해주세요."); return; }
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('resultContainer').classList.add('hidden');
        document.getElementById('resultContainer').innerHTML = '';
        setTimeout(async () => { await processData(currentJsonData, refDateStr); }, 100);
    });

    // 동기화 공통 로직 모듈화 (정선됨)
    const syncSpecialLocations = (rows) => {
        for(let i=0; i<rows.length; i++) {
            const row = rows[i];
            const isSpecial = row.isPhaseChanger || row.category === 'EXCLUSION' || row.category === 'HIDDEN_WORK' || row.typeRaw.includes('파견') || row.typeRaw.includes('휴직') || row.category === 'MARKER';
            
            if(isSpecial) {
                const sch = row.parsedLocation.school || '';
                if (sch.match(/초등학교|유치원|분교|학교/) && !row.isInheritedLoc) continue; 

                let found = false;
                
                // [선생님 핵심 규칙] 0순위: 시작 날짜가 "정확히" 일치하는 학교를 최우선 탐색!
                // 과거 학교의 종료일과 전보 발령일이 하루 겹쳐서 과거 학교로 빨려 들어가는 현상을 완벽 차단합니다.
                for(let j=0; j<rows.length; j++) {
                    if (i !== j && (rows[j].parsedLocation.school||'').match(/초등학교|유치원|분교|학교/)) {
                        if (rows[j].startDate === row.startDate) {
                            row.parsedLocation.region = rows[j].parsedLocation.region;
                            row.parsedLocation.school = rows[j].parsedLocation.school;
                            row.isInheritedLoc = true;
                            found = true; break;
                        }
                    }
                }

                // 1순위: 마커 발령일이 해당 학교의 근무 기간(시작일~종료일) 안에 완전히 포함되는 경우
                if (!found) {
                    for(let j=0; j<rows.length; j++) {
                        if (i !== j && (rows[j].parsedLocation.school||'').match(/초등학교|유치원|분교|학교/)) {
                            if (rows[j].startDate <= row.startDate && row.startDate <= rows[j].endDate) {
                                row.parsedLocation.region = rows[j].parsedLocation.region;
                                row.parsedLocation.school = rows[j].parsedLocation.school;
                                row.isInheritedLoc = true;
                                found = true; break;
                            }
                        }
                    }
                }

                // 2순위: 미래
                if (!found) {
                    for(let j=i+1; j<rows.length; j++) {
                        if((rows[j].parsedLocation.school||'').match(/초등학교|유치원|분교|학교/) && !rows[j].isInheritedLoc) {
                            row.parsedLocation.region = rows[j].parsedLocation.region;
                            row.parsedLocation.school = rows[j].parsedLocation.school;
                            row.isInheritedLoc = true; found = true; break;
                        }
                    }
                }
                // 3순위: 과거 (새출발 마커는 탐색 금지)
                if (!found && !row.isPhaseChanger) {
                    for(let j=i-1; j>=0; j--) {
                        if((rows[j].parsedLocation.school||'').match(/초등학교|유치원|분교|학교/) && !rows[j].isInheritedLoc) {
                            row.parsedLocation.region = rows[j].parsedLocation.region;
                            row.parsedLocation.school = rows[j].parsedLocation.school;
                            row.isInheritedLoc = true; break;
                        }
                    }
                }
            }
        }
    };

    async function processData(rawData, refDateStr) {
        try {
            const keys = Object.keys(rawData[0]);
            const findKey = (keywords) => keys.find(k => keywords.some(keyword => typeof k === 'string' && k.replace(/\s+/g, '').includes(keyword)));

            const keyPeriod = findKey(['기간']);
            const keyStart = findKey(['발령일자', '시작일']);
            const keyEnd = findKey(['종료일']);
            const keyType = findKey(['임용구분', '발령구분']);
            const keyDept = findKey(['부서', '소속']);
            const keyAuth = findKey(['발령청', '임용권자']);

            if (!keyType || (!keyPeriod && !keyStart)) throw new Error("필수 열을 찾을 수 없습니다.");

            // 1. 기초 파싱 및 시스템 플래그 세팅
            let validRows = rawData
                .filter(row => row[keyPeriod] || row[keyStart])
                .map(row => {
                    let start = "", end = ""; let hasExplicitEndDate = false; 
                    if (keyPeriod && row[keyPeriod]) {
                        const parts = row[keyPeriod].toString().trim().split('~');
                        start = parts[0] ? parts[0].trim() : "";
                        if (parts.length > 1 && parts[1].trim() !== "") { end = parts[1].trim(); hasExplicitEndDate = true; }
                    } else if (keyStart && row[keyStart]) {
                        start = row[keyStart];
                        if (keyEnd && row[keyEnd] && row[keyEnd].toString().trim() !== "") { end = row[keyEnd]; hasExplicitEndDate = true; }
                    }
                    
                    if(typeof start === 'number') start = new Date(Math.round((start - 25569)*86400*1000)).toISOString().split('T')[0];
                    if(typeof end === 'number') end = new Date(Math.round((end - 25569)*86400*1000)).toISOString().split('T')[0];
                    if (typeof start === 'string') start = start.replace(/[\.\/]/g, '-').substring(0, 10).trim();
                    if (typeof end === 'string') end = end.replace(/[\.\/]/g, '-').substring(0, 10).trim();
                    if (!hasExplicitEndDate) end = start;

                    const t = String(row[keyType] || '').replace(/\s+/g, '');
                    let isNewHireMarker = t.includes('채용') || t.includes('공채');
                    let isInterOffice = t.match(/교육청간|부처간|전입|전출/) ? true : false;
                    let isPhaseChanger = isNewHireMarker || isInterOffice;

                    return {
                        typeRaw: row[keyType] || '미상',
                        category: determineCategory(row[keyType]),
                        startDate: start, endDate: end,
                        hasExplicitEndDate: hasExplicitEndDate,
                        deptRaw: row[keyDept] || '', authRaw: row[keyAuth] || '',
                        parsedLocation: extractRegionAndSchool(row[keyDept], row[keyAuth]),
                        isNewHireMarker: isNewHireMarker,
                        isInterOffice: isInterOffice,
                        isPhaseChanger: isPhaseChanger
                    };
                })
                .filter(row => row.startDate && row.startDate.length >= 8 && !row.typeRaw.includes('보직교사') && !row.typeRaw.includes('분교장발령'));

            // 1차 정렬 (과거순)
            validRows.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            // [선생님 특별 요청] 첨부해주신 지도를 바탕으로 '창원', '마산', '진해' 소속 학교들을 영구적으로 강제 배정하는 절대 사전(Dictionary) 완결판!
            const HARDCODED_SCHOOLS = {

                '대야초': '진해', '동부초': '진해', '진해냉천초': '진해', '도천초': '진해',
                '제황초': '진해', '덕산초': '진해', '자은초': '진해', '진해남산초': '진해',
                '풍호초': '진해', '장천초': '진해', '웅천초': '진해', '웅동초': '진해',

                '교동초': '마산', '팔룡초': '마산', '가고파초': '마산', '가포초': '마산', '감천초': '마산',

                '유목초': '창원', '반송초': '창원', '용호초': '창원', '용지초': '창원', '용남초': '창원',

                '도계초': '창원', '명도초': '창원', '창원한들초': '창원', '시화초': '창원', '사화초': '창원',

                '상북초': '창원', '봉림초': '창원'
            };

            // [핵심 3] 나이스 API 연동 (버그 우회 및 동명이교 방지)
            let schoolRegionCache = {};
            let schoolSubRegionMap = {}; 

            validRows.forEach(row => {
                const rLoc = row.parsedLocation.region || '';
                const dRaw = row.deptRaw || ''; const aRaw = row.authRaw || '';
                const sLoc = row.parsedLocation.school || '';
                if(sLoc && sLoc.match(/초등학교|유치원|분교|학교/)) {
                    if (dRaw.includes('마산') || aRaw.includes('마산') || rLoc.includes('마산') || sLoc.includes('마산')) schoolSubRegionMap[sLoc] = '마산';
                    else if (dRaw.includes('진해') || aRaw.includes('진해') || rLoc.includes('진해') || sLoc.includes('진해')) schoolSubRegionMap[sLoc] = '진해';
                }

            for(let row of validRows) {
                let loc = row.parsedLocation;
                let sLoc = loc.school || ''; let rLoc = loc.region || '';
                
                let needsRegionApi = !rLoc && sLoc.match(/초등학교|유치원|분교|학교/);
                let isChangwonArea = (rLoc.includes('창원') || row.deptRaw.includes('창원')) && sLoc.match(/초등학교|유치원|분교|학교/);
                let needsSubRegionApi = isChangwonArea && !schoolSubRegionMap[sLoc];

                if (needsRegionApi || needsSubRegionApi) {
                    let searchName = sLoc.includes('유치원') ? sLoc.replace(/병설유치원|유치원/g, '초등학교') : sLoc;
                    
                    let excelOfficeName = "";
                    if (row.deptRaw) { let m = row.deptRaw.match(/([가-힣]+(교육청|교육지원청))/); if (m) excelOfficeName = m[1]; }
                    if (!excelOfficeName && rLoc) { let m = rLoc.match(/([가-힣]+(교육청|교육지원청))/); if(m) excelOfficeName = m[1]; }

                    let cacheKey = searchName + "_" + excelOfficeName;
                    if(schoolRegionCache[cacheKey]) { if(needsRegionApi) loc.region = schoolRegionCache[cacheKey]; continue; }

                    try {
                        // [강력 업데이트 2] 마산/진해 생략 학교명 완벽 탐색 (예: 교동초 -> 마산교동초)
                        let searchNamesToTry = [searchName];

                        // 창원 지역 소속임이 확실한데 이름에 마산/진해가 없다면, API 검색 실패를 대비해 접두어 버전을 장전합니다.
                        if (isCwArea && !searchName.startsWith('마산') && !searchName.startsWith('진해') && !searchName.startsWith('창원')) {

                            searchNamesToTry.push('진해' + searchName);
                            searchNamesToTry.push('창원' + searchName);

                        let bestMatch = null;
                        let gyeongnamMatch = null;
                        let rowData = null;

                            let res = await fetch(apiUrl, { signal: controller.signal });
                            clearTimeout(timeoutId);
                            
                            let data = await res.json();
                            if(data.schoolInfo && data.schoolInfo[1].row && data.schoolInfo[1].row.length > 0) {
                                let rows = data.schoolInfo[1].row;
                                if (!rowData) rowData = rows[0]; 
                                
                                for(let r of rows) {
                                    let rDept = r.JU_ORG_NM || ""; let rSido = r.ATPT_OFCDC_SC_NM || ""; 
                                    if (rSido.includes('경상남도')) {
                                        if (!gyeongnamMatch) gyeongnamMatch = r;
                                        if (excelOfficeName) {
                                            let searchOffice = excelOfficeName.replace(/마산|진해/, '창원').replace(/교육청$/, '교육지원청');
                                            if (rDept.includes(searchOffice) || searchOffice.includes(rDept)) { bestMatch = r; break; }
                                        } else if (isCwArea && rDept.includes('창원')) {
                                            bestMatch = r; break; 
                                        }
                                    }
                                }
                            }
                            if (bestMatch) break; // 완벽한 창원/마산/진해 소속 학교를 찾았다면 즉시 검색 중단!
                        }

                        if (bestMatch) rowData = bestMatch; else if (gyeongnamMatch) rowData = gyeongnamMatch;

                        if (rowData) {
                            let orgNm = rowData.JU_ORG_NM || rowData.ATPT_OFCDC_SC_NM; 
                            const provRegex = /(경상남도|경상북도|경기도|전라남도|전라북도|전북특별자치도|충청남도|충청북도|강원도|강원특별자치도|제주특별자치도|서울특별시|부산광역시|대구광역시|인천광역시|광주광역시|대전광역시|울산광역시|세종특별자치시)/g;
                            if (orgNm !== rowData.ATPT_OFCDC_SC_NM || rowData.JU_ORG_NM) {
                                let strippedOrgNm = orgNm.replace(provRegex, '').replace(/^교육청/, '');
                                if (strippedOrgNm.match(/^(강남|강북|동부|서부|남부|북부|중부|성북|성동|동래|해운대|강서|강동)/)) {
                                    let provMatch = (rowData.ATPT_OFCDC_SC_NM || "").match(provRegex);
                                    if (provMatch) orgNm = provMatch[0] + strippedOrgNm; else orgNm = strippedOrgNm;
                                } else orgNm = strippedOrgNm;
                            }
                            
                            schoolRegionCache[cacheKey] = orgNm;
                            if(needsRegionApi) loc.region = orgNm;

                            let address = rowData.ORG_RDNMA || rowData.ORG_RDNDA || "";
                            if (address.includes('마산합포구') || address.includes('마산회원구') || address.includes('마산시')) schoolSubRegionMap[sLoc] = '마산';
                            else if (address.includes('진해구') || address.includes('진해시')) schoolSubRegionMap[sLoc] = '진해';
                            else if (address.includes('의창구') || address.includes('성산구') || address.includes('창원시')) schoolSubRegionMap[sLoc] = '창원';
                        } else {
                            if(needsRegionApi) schoolRegionCache[cacheKey] = '기타지역'; 
                        }
                    } catch(e) { if(needsRegionApi) schoolRegionCache[cacheKey] = '기타지역'; }
                }
                if (!loc.region) loc.region = '기타지역';
            }

            // 1차 동기화 수행
            syncSpecialLocations(validRows);

            // [핵심 2] 명시적 종료일 없는 발령 기간(endDate) 스마트 할당 (분할 로직 전진 배치!)
            validRows.forEach((row, i) => {
                if (!row.hasExplicitEndDate) {
                    if ((row.category === 'WORK' || row.category === 'EXCLUSION' || row.category === 'MARKER') && !row.isPhaseChanger) {
                        let nextEventRow = null;
                        for (let j = i + 1; j < validRows.length; j++) {
                            let nextRow = validRows[j];
                            if ((row.category === 'EXCLUSION' || row.typeRaw.includes('휴직') || row.typeRaw.includes('파견')) && 
                                (nextRow.typeRaw.includes('복직') || nextRow.typeRaw.includes('파견복귀'))) { nextEventRow = nextRow; break; }
                            
                            // 다음 이동 기록 감지
                            if ((nextRow.category === 'WORK' || nextRow.category === 'MARKER') && 
                                !nextRow.isPhaseChanger && nextRow.parsedLocation.school !== row.parsedLocation.school) {
                                nextEventRow = nextRow; break;
                            }
                        }
                        if (nextEventRow) {
                            let d = new Date(nextEventRow.startDate); d.setDate(d.getDate() - 1);
                            let endStr = d.toISOString().split('T')[0];
                            row.endDate = (endStr < row.startDate) ? row.startDate : endStr;
                        } else {
                            row.endDate = refDateStr; // 다음 기록이 없으면 기준일까지 연장
                        }
                    } else {
                        row.endDate = row.startDate; // 마커들은 당일치기
                    }
                }
            });

            // [핵심 5] 관내 이동 구간 지역 동기화 (연대 책임 알고리즘)
            let currentSyncPhase = []; let phasesForSync = [];
            validRows.forEach(row => {
                if (row.isPhaseChanger) {
                    if (currentSyncPhase.length > 0) phasesForSync.push(currentSyncPhase);
                    currentSyncPhase = [];
                }
                currentSyncPhase.push(row);
            });
            if (currentSyncPhase.length > 0) phasesForSync.push(currentSyncPhase);

            phasesForSync.forEach(phaseRows => {
                let knownSubRegion = null;
                for (let row of phaseRows) {
                    let sLoc = row.parsedLocation.school || '';
                    if (sLoc && schoolSubRegionMap[sLoc]) { knownSubRegion = schoolSubRegionMap[sLoc]; break; }
                    
                    let dRaw = row.deptRaw || '', aRaw = row.authRaw || '', rLoc = row.parsedLocation.region || '';
                    if (dRaw.includes('마산') || aRaw.includes('마산') || rLoc.includes('마산') || sLoc.includes('마산')) knownSubRegion = '마산';
                    else if (dRaw.includes('진해') || aRaw.includes('진해') || rLoc.includes('진해') || sLoc.includes('진해')) knownSubRegion = '진해';
                    if(knownSubRegion) break;
                }
                if (knownSubRegion) { phaseRows.forEach(row => row.syncSubRegion = knownSubRegion); }
            });

            // [핵심 4] 창원/마산/진해 통합 및 2010.09.01 분할 로직
            let splitRows = [];
            validRows.forEach(row => {
                const rLoc = row.parsedLocation.region || '', dRaw = row.deptRaw || '', aRaw = row.authRaw || '', sLoc = row.parsedLocation.school || ''; 
                
                let isChangwonArea = false;
                if (rLoc.match(/창원|마산|진해/) && rLoc.includes('교육')) isChangwonArea = true;
                else if ((dRaw.includes('창원') || dRaw.includes('마산') || dRaw.includes('진해')) && (dRaw.includes('초등학교') || dRaw.includes('유치원') || dRaw.includes('교육') || dRaw.includes('학교'))) isChangwonArea = true;
                else if (aRaw.includes('창원') || aRaw.includes('마산') || aRaw.includes('진해')) isChangwonArea = true;
                if (rLoc === '경상남도교육청' && !dRaw.includes('창원') && !dRaw.includes('마산') && !dRaw.includes('진해')) isChangwonArea = false;

                if (isChangwonArea) {
                    let subRegion = "창원";
                    
                    let forceRegion = null;
                    let sortedKeys = Object.keys(HARDCODED_SCHOOLS).sort((a, b) => b.length - a.length);
                    for (let key of sortedKeys) {
                        if (sLoc.includes(key)) { forceRegion = HARDCODED_SCHOOLS[key]; break; }
                    }

                    // [궁극의 해결] 0순위: 선생님께서 제공하신 지도 기반 절대 배정표 (창원, 마산 관내 모든 학교)
                    if (forceRegion) {
                        subRegion = forceRegion;
                    } 
                    // 1순위: 개별 학교의 API 주소 결과나 명시적 키워드가 있으면 무조건 최우선 독립!
                    else if (schoolSubRegionMap[sLoc] === '마산' || dRaw.includes('마산') || aRaw.includes('마산') || rLoc.includes('마산') || sLoc.includes('마산')) {
                        subRegion = "마산";
                    } else if (schoolSubRegionMap[sLoc] === '진해' || dRaw.includes('진해') || aRaw.includes('진해') || rLoc.includes('진해') || sLoc.includes('진해')) {
                        subRegion = "진해";
                    } else if (schoolSubRegionMap[sLoc] === '창원') {
                        subRegion = "창원";
                    } 
                    // 2순위: 자기 정보를 아예 모를 때만 동기화 꼬리표(연대 책임)를 따름
                    else if (row.syncSubRegion) {
                        subRegion = row.syncSubRegion;
                    }

                    if (row.startDate < "2010-09-01" && row.endDate >= "2010-09-01") {
                        let r1 = JSON.parse(JSON.stringify(row));
                        r1.endDate = "2010-08-31"; r1.parsedLocation.region = subRegion + "교육청";
                        splitRows.push(r1);

                        let r2 = JSON.parse(JSON.stringify(row));
                        r2.startDate = "2010-09-01"; r2.parsedLocation.region = `창원교육지원청(${subRegion})`;
                        splitRows.push(r2);
                    } else if (row.startDate >= "2010-09-01") {
                        row.parsedLocation.region = `창원교육지원청(${subRegion})`;
                        splitRows.push(row);
                    } else {
                        row.parsedLocation.region = subRegion + "교육청";
                        splitRows.push(row);
                    }
                } else {
                    splitRows.push(row);
                }
            });
            validRows = splitRows;

            // 2차 정렬 (분할된 것들 붙이기)
            validRows.sort((a, b) => {
                let diff = new Date(a.startDate) - new Date(b.startDate);
                if (diff === 0) {
                    if (a.isNewHireMarker && !b.isNewHireMarker) return -1;
                    if (!a.isNewHireMarker && b.isNewHireMarker) return 1;
                    if (a.isPhaseChanger && !b.isPhaseChanger) return -1;
                    if (!a.isPhaseChanger && b.isPhaseChanger) return 1;
                    const getCatOrder = cat => ({ 'HIDDEN_WORK': 1, 'MARKER': 2, 'WORK': 3, 'EXCLUSION': 4 })[cat] || 5;
                    if (getCatOrder(a.category) !== getCatOrder(b.category)) return getCatOrder(a.category) - getCatOrder(b.category);
                    return a.typeRaw.includes('승진') ? -1 : 1;
                }
                return diff;
            });

            // 2차 동기화 (분할로 쪼개진 기록들 학교/지역 붙여주기)
            syncSpecialLocations(validRows);

            // Phase / Block 편성
            let phases = []; let currentPhase = null; let currentMarkerContext = { region: null, school: null };
            validRows.forEach(row => {
                if (row.category === 'MARKER' || row.isPhaseChanger) {
                    currentMarkerContext.region = row.parsedLocation.region;
                    currentMarkerContext.school = row.parsedLocation.school;
                }
                
                // 그림자 상속 방어
                if (!row.parsedLocation.region && currentMarkerContext.region && !row.isPhaseChanger) {
                    Object.assign(row.parsedLocation, { region: currentMarkerContext.region, school: currentMarkerContext.school });
                    row.inherited = true; 
                }

                let regionContext = row.parsedLocation.region || '기타지역';
                if (!currentPhase || currentPhase.region !== regionContext) {
                    currentPhase = { id: phases.length + 1, region: regionContext, blocks: [] };
                    phases.push(currentPhase);
                }
                row.phaseId = currentPhase.id;
            });

            // [업데이트] 출력용 최종 정렬 (화면에 드롭다운이 없더라도 에러가 나지 않도록 방어 코드 추가)
            const sortOrderElem = document.getElementById('sortOrder');
            const sortOrder = sortOrderElem ? sortOrderElem.value : 'desc';
            
            validRows.sort((a, b) => {
                if (sortOrder === 'desc') {
                    let diff = new Date(b.startDate) - new Date(a.startDate);
                    if(diff === 0) {
                        if (a.isNewHireMarker && !b.isNewHireMarker) return 1; 
                        if (!a.isNewHireMarker && b.isNewHireMarker) return -1;
                        if (a.isPhaseChanger && !b.isPhaseChanger) return 1; 
                        if (!a.isPhaseChanger && b.isPhaseChanger) return -1;
                        if (b.phaseId !== a.phaseId) return b.phaseId - a.phaseId; 
                        const getCatOrder = cat => ({ 'HIDDEN_WORK': 1, 'MARKER': 2, 'WORK': 3, 'EXCLUSION': 4 })[cat] || 5;
                        return getCatOrder(b.category) - getCatOrder(a.category);
                    }
                    return diff;
                } else {
                    let diff = new Date(a.startDate) - new Date(b.startDate); // 과거순 정렬
                    if(diff === 0) {
                        if (a.isNewHireMarker && !b.isNewHireMarker) return -1; 
                        if (!a.isNewHireMarker && b.isNewHireMarker) return 1;
                        if (a.isPhaseChanger && !b.isPhaseChanger) return -1; 
                        if (!a.isPhaseChanger && b.isPhaseChanger) return 1;
                        if (a.phaseId !== b.phaseId) return a.phaseId - b.phaseId; 
                        const getCatOrder = cat => ({ 'HIDDEN_WORK': 1, 'MARKER': 2, 'WORK': 3, 'EXCLUSION': 4 })[cat] || 5;
                        return getCatOrder(a.category) - getCatOrder(b.category);
                    }
                    return diff;
                }
            });

            let currentBlock = null;
            validRows.forEach(row => {
                let schoolContext = row.parsedLocation.school || row.deptRaw || '소속 불명';
                const isKinder = schoolContext.includes('유치원');
                let targetPhase = phases.find(p => p.id === row.phaseId) || phases[phases.length-1];

                if (!currentBlock || currentBlock.school !== schoolContext || currentBlock.phaseId !== row.phaseId) {
                    currentBlock = { school: schoolContext, phaseId: row.phaseId, records: [], isKinder: isKinder };
                    targetPhase.blocks.push(currentBlock);
                }
                currentBlock.records.push(row);
            });

            let globalTotalYMD = {y:0, m:0, d:0};
            let resultHtml = '';
            
            // 최신순일 경우 구역(Phase)도 뒤집어줍니다.
            if (sortOrder === 'desc') phases.reverse(); 
            
            // UI 렌더링부
            phases.forEach(section => {
                let secWorkRecords = [], secExcRecords = [], validBlocks = false;
                
                section.blocks.forEach(b => {
                    const vRecs = b.records.filter(r => r.category !== 'HIDDEN_WORK');
                    if (vRecs.length > 0) validBlocks = true;

                    if (!b.isKinder) {
                        const bWorkRecs = b.records.filter(r => (r.category === 'WORK' || r.category === 'MARKER') && !(r.startDate === r.endDate && r.isPhaseChanger));
                        const bExcRecs = b.records.filter(r => r.category === 'EXCLUSION');
                        secWorkRecords = secWorkRecords.concat(bWorkRecs);
                        secExcRecords = secExcRecords.concat(bExcRecs);
                    }
                });
                
                if(!validBlocks) return;
                
                let sPeriodYMD = subYMD(getPeriodFromMerged(mergePeriods(secWorkRecords)), getPeriodFromMerged(mergePeriods(secExcRecords)));
                globalTotalYMD = addYMD(globalTotalYMD, sPeriodYMD);

                let secStart = "9999-99-99", secEnd = "0000-00-00";
                section.blocks.forEach(b => b.records.forEach(r => {
                    if (r.category !== 'HIDDEN_WORK') {
                        if (r.startDate < secStart) secStart = r.startDate;
                        if (r.endDate > secEnd) secEnd = r.endDate;
                    }
                }));

                resultHtml += `
                <div class="relative pl-6 sm:pl-10 mb-6 group">
                    <div class="timeline-line group-last:bg-gradient-to-b group-last:from-slate-200 group-last:to-transparent"></div>
                    <div class="relative z-10 glass-panel rounded-xl p-3 sm:p-4 mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-l-4 border-l-indigo-500 shadow-sm transition-shadow hover:shadow-md">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-inner"><i class="fa-solid fa-map-location-dot text-white text-lg"></i></div>
                            <div>
                                <h2 class="text-lg font-black text-slate-900 flex items-center gap-2">${section.region} <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 border border-indigo-100 flex items-center shadow-sm"><i class="fa-solid fa-layer-group mr-1"></i> 초등교사 구간</span></h2>
                                <p class="text-xs text-slate-500 font-medium mt-0.5 flex items-center"><i class="fa-regular fa-calendar text-slate-400 mr-1.5"></i> ${secStart} ~ ${secEnd}</p>
                            </div>
                        </div>
                        <div class="bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 text-right min-w-[140px] shadow-sm">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">지역 합산 인정기간</p>
                            <p class="text-base font-black text-indigo-700">${formatYMDObj(sPeriodYMD)} <span class="text-xs text-slate-400 font-semibold ml-1">(${periodToDays(sPeriodYMD)}일)</span></p>
                        </div>
                    </div>
                    <div class="space-y-3">
                `;

                section.blocks.forEach(block => {
                    const vRecs = block.records.filter(r => r.category !== 'HIDDEN_WORK');
                    if (vRecs.length === 0) return;

                    let bStart = "9999-99-99", bEnd = "0000-00-00";
                    vRecs.forEach(r => { if(!r.isPhaseChanger) { if (r.startDate < bStart) bStart = r.startDate; if (r.endDate > bEnd) bEnd = r.endDate; } });
                    if (bStart === "9999-99-99") { vRecs.forEach(r => { if (r.startDate < bStart) bStart = r.startDate; if (r.endDate > bEnd) bEnd = r.endDate; }); }
                    if (bStart === "9999-99-99") { bStart = "기록 없음"; bEnd = "기록 없음"; }

                    const bWorkRecs = block.records.filter(r => (r.category === 'WORK' || r.category === 'MARKER') && !(r.startDate === r.endDate && r.isPhaseChanger));
                    const bExcRecs = block.records.filter(r => r.category === 'EXCLUSION');
                    
                    let bPeriodYMD = subYMD(getPeriodFromMerged(mergePeriods(bWorkRecs)), getPeriodFromMerged(mergePeriods(bExcRecs)));
                    
                    let bgClass = block.isKinder ? "bg-amber-50/50 border-amber-200" : "bg-white border-slate-200";
                    let titleClass = block.isKinder ? "text-amber-900" : "text-slate-900";
                    let dotBorder = block.isKinder ? "border-amber-500" : "border-indigo-500";

                    resultHtml += `
                    <div class="relative">
                        <div class="glass-panel rounded-xl overflow-hidden border ${bgClass} transition-shadow hover:shadow-md">
                            <div class="border-b border-slate-100/80 px-3 sm:px-4 py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-white/50">
                                <div class="flex items-start gap-2.5">
                                    <div class="w-3 h-3 mt-1.5 rounded-full border-2 ${dotBorder} bg-white shadow-sm shrink-0"></div>
                                    <div>
                                        <h3 class="text-base font-extrabold ${titleClass} flex items-center gap-2">${block.school} ${block.isKinder ? '<span class="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded border border-amber-200 font-bold shadow-sm">병설유치원 (합산제외)</span>' : ''}</h3>
                                        <p class="text-xs text-slate-500 font-medium mt-0.5 flex items-center"><i class="fa-regular fa-clock text-slate-400 mr-1.5"></i> ${bStart} ~ ${bEnd}</p>
                                    </div>
                                </div>
                                ${!block.isKinder ? `
                                <div class="text-right mt-1 sm:mt-0 pl-5 sm:pl-0">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">실근무 계산</p>
                                    <span class="inline-flex items-baseline px-2.5 py-0.5 rounded bg-blue-50 border border-blue-100 shadow-sm"><span class="text-blue-700 font-black text-[13px]">${formatYMDObj(bPeriodYMD)}</span><span class="text-blue-400 text-[10px] font-semibold ml-1.5">(${periodToDays(bPeriodYMD)}일)</span></span>
                                </div>` : ''}
                            </div>
                            <div class="p-3 sm:p-4"><ul class="space-y-1">
                    `;

                    vRecs.forEach(rec => {
                        if (rec.isPhaseChanger) {
                            let iconClass = rec.isNewHireMarker ? "fa-seedling text-emerald-400" : "fa-flag text-blue-400";
                            let badgeClass = rec.isNewHireMarker ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-blue-50 text-blue-700 border-blue-200";
                            let dateClass = rec.isNewHireMarker ? "text-emerald-700" : "text-blue-700";
                            let labelClass = rec.isNewHireMarker ? "bg-emerald-100 text-emerald-700" : "bg-blue-100 text-blue-700";
                            let badgeText = rec.isNewHireMarker ? "(최초 임용)" : "(지역 이동)";
                            let dateDisplay = rec.startDate;
                            if (rec.startDate !== rec.endDate && rec.endDate !== "9999-99-99") {
                                dateDisplay = `${rec.startDate} ~ ${rec.endDate} <span class="text-[10px] bg-white px-1 py-0.5 rounded shadow-sm border border-emerald-100 ml-1 text-slate-600 font-semibold">(${formatYMDObj(calcPeriodYMD(rec.startDate, rec.endDate))})</span>`;
                            }
                            resultHtml += `<li class="flex flex-col sm:flex-row sm:items-center justify-between p-2 sm:p-2.5 rounded-lg hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100"><div class="flex items-center gap-3 mb-1 sm:mb-0"><div class="w-5 flex justify-center"><i class="fa-solid ${iconClass} text-sm"></i></div><div><span class="inline-block px-2 py-0.5 text-[11px] font-bold rounded border ${badgeClass} mr-2 shadow-sm">${rec.typeRaw}</span><span class="text-[13px] font-medium text-gray-800">${rec.deptRaw}</span></div></div><div class="text-[12px] text-gray-500 flex flex-wrap items-center gap-1.5 sm:min-w-[240px] justify-end font-medium"><span class="${dateClass} font-bold">${dateDisplay}</span><span class="text-[10px] ${labelClass} px-1.5 py-0.5 rounded font-bold shadow-sm">${badgeText}</span></div></li>`;
                            return; 
                        }

                        let badge = "bg-gray-100 text-gray-700", text = "text-gray-800", icon = "fa-check text-gray-400", isExc = false;
                        if (rec.category === 'MARKER') { badge = "bg-orange-50 text-orange-600 border-orange-200"; icon = "fa-briefcase text-orange-400"; }
                        if (rec.category === 'EXCLUSION') { badge = "bg-red-50 text-red-600 border-red-200"; text = "text-red-600 line-through opacity-70"; icon = "fa-ban text-red-400"; isExc = true; }

                        resultHtml += `
                            <li class="flex flex-col sm:flex-row sm:items-center justify-between p-2 sm:p-2.5 rounded-lg hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100">
                                <div class="flex items-center gap-3 mb-1 sm:mb-0"><div class="w-5 flex justify-center"><i class="fa-solid ${icon} text-sm"></i></div><div><span class="inline-block px-2 py-0.5 text-[11px] font-bold rounded border ${badge} mr-2 shadow-sm">${rec.typeRaw}</span><span class="text-[13px] font-medium ${text}">${rec.deptRaw}</span></div></div>
                                <div class="text-[12px] text-slate-500 flex flex-wrap items-center gap-1.5 sm:min-w-[240px] justify-end font-medium"><span>${rec.startDate} ~ ${rec.endDate}</span><span class="text-[10px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-bold ${isExc?'text-red-500':''} border border-slate-200">(${formatYMDObj(calcPeriodYMD(rec.startDate, rec.endDate))})</span></div>
                            </li>`;
                    });
                    resultHtml += `</ul></div></div></div>`;
                });
                resultHtml += `</div></div>`;
            });

            // 총합 표시
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('resultContainer').innerHTML = `
            <div class="glass-panel rounded-2xl p-5 sm:p-6 border-t-4 border-t-indigo-500 shadow-lg relative overflow-hidden group mb-6">
                <div class="absolute -right-10 -top-10 text-indigo-50/50 transform rotate-12 transition-transform group-hover:rotate-45 duration-700"><i class="fa-solid fa-trophy text-8xl"></i></div>
                <div class="relative z-10 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-inner text-white text-xl"><i class="fa-solid fa-award"></i></div>
                        <div><p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">총 인정 실근무경력</p><h2 class="text-xl sm:text-2xl font-black text-slate-900 leading-tight">분석 완료</h2></div>
                    </div>
                    <div class="bg-indigo-50 px-5 sm:px-6 py-3 rounded-xl border border-indigo-100 text-center shadow-sm">
                        <p class="text-2xl sm:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 drop-shadow-sm">${formatYMDObj(globalTotalYMD)}</p>
                        <p class="text-[11px] font-bold text-indigo-400 mt-0.5">나이스 공식 역산법 적용 (총 환산 ${periodToDays(globalTotalYMD)}일)</p>
                    </div>
                </div>
            </div>` + resultHtml;
            document.getElementById('resultContainer').classList.remove('hidden');

        } catch (error) {
            document.getElementById('loading').classList.add('hidden');
            showError("데이터 처리 중 오류가 발생했습니다.\n" + error.message);
        }
    }
</script>
</body>
</html>
